<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; color: white; font-family: sans-serif; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #info { position: absolute; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="info">Подключение...</div>
    <video id="remoteVideo" autoplay playsinline controls muted></video>

    <script>
        const peer = new Peer({
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' }
                ]
            }
        });

        const videoElement = document.getElementById('remoteVideo');
        const infoDiv = document.getElementById('info');

        peer.on('open', () => {
            infoDiv.innerText = "Соединение установлено. Поиск стрима...";
            const call = peer.call('lion-ultimate-stream-2026', new MediaStream());
            
            call.on('stream', (stream) => {
                infoDiv.style.display = 'none';
                videoElement.srcObject = stream;
                videoElement.play().catch(() => {
                    infoDiv.style.display = 'block';
                    infoDiv.innerText = "Кликните по экрану для запуска видео";
                });
            });
        });

        document.body.addEventListener('click', () => {
            if (videoElement.srcObject) {
                videoElement.play();
                infoDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
