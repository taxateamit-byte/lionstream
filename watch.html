<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Просмотр Экрана</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; color: white; font-family: sans-serif; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #info { position: absolute; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="info">Подключение к стриму...</div>
    <video id="remoteVideo" autoplay playsinline controls muted></video>

    <script>
        const ROOM_ID = 'lion-ultimate-stream-2026';
        const peer = new Peer(); 
        const videoElem = document.getElementById('remoteVideo');
        const infoDiv = document.getElementById('info');

        peer.on('open', () => {
            infoDiv.innerText = "Соединение установлено. Запрашиваем поток...";
            
            // Звоним по ТОЧНО такому же ID, как у стримера
            const call = peer.call(ROOM_ID, new MediaStream());
            
            call.on('stream', (stream) => {
                infoDiv.style.display = 'none';
                videoElem.srcObject = stream;
                videoElem.play().catch(e => console.log("Кликните по плееру для активации видео"));
            });
        });

        peer.on('error', (err) => {
            infoDiv.innerText = "Стример еще не включил демонстрацию.";
        });
    </script>
</body>
</html>
