<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Просмотр Экрана</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <video id="remoteVideo" autoplay playsinline controls muted></video>
    <script>
        const peer = new Peer(); // Твой случайный ID
        const videoElem = document.getElementById('remoteVideo');

        peer.on('open', () => {
            // Подключаемся к ID чешского клиента
            const call = peer.call('lion-share-stream-id', new MediaStream());
            call.on('stream', (stream) => { videoElem.srcObject = stream; });
        });
    </script>
</body>
</html>
