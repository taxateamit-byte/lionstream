<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трансляция Экрана</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #11111b; font-family: sans-serif; margin: 0; }
        #startBtn { padding: 20px 40px; font-size: 22px; color: #fff; background: linear-gradient(45deg, #ff416c, #ff4b2b); border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
        #status { position: absolute; bottom: 20px; color: #888; }
    </style>
</head>
<body>

    <button id="startBtn">Включить демонстрацию</button>
    <div id="status">Подключение...</div>

    <script>
        // Чистый конфиг без лишних кавычек для GitHub
        const peer = new Peer('lion-ultimate-stream-2026', {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' }
                ]
            }
        });

        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');

        peer.on('open', () => { statusDiv.innerText = "Система готова. Нажмите кнопку."; });
        peer.on('error', (err) => { statusDiv.innerText = "Ошибка: " + err.type; });

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { width: 1280, height: 720, frameRate: 15 }, 
                    audio: false 
                });
                statusDiv.innerText = "Стрим в эфире! Ожидайте...";
                startBtn.style.display = 'none';

                peer.on('call', (call) => {
                    call.answer(stream);
                    statusDiv.innerText = "Показ идет!";
                });
            } catch (err) {
                alert("Ошибка: " + err.message);
            }
        });
    </script>
</body>
</html>
