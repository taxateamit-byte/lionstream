<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трансляция Экрана</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #11111b; font-family: sans-serif; margin: 0; }
        #startBtn { padding: 20px 40px; font-size: 22px; color: #fff; background: linear-gradient(45deg, #ff416c, #ff4b2b); border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
        #status { position: absolute; bottom: 20px; color: #888; }
    </style>
</head>
<body>

    <button id="startBtn">Включить демонстрацию</button>
    <div id="status">Подключение...</div>

    <script>
        // Жестко заданный ID для связи
        const peer = new Peer('lion-ultimate-stream-2026');
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');

        peer.on('open', function() { 
            statusDiv.innerText = "Система готова. Нажмите кнопку."; 
        });

        peer.on('error', function(err) { 
            statusDiv.innerText = "Ошибка сети: " + err.type; 
        });

        startBtn.addEventListener('click', async function() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: true, 
                    audio: false 
                });
                statusDiv.innerText = "Стрим в эфире! Ожидайте зрителя...";
                startBtn.style.display = 'none';

                peer.on('call', function(call) {
                    call.answer(stream);
                    statusDiv.innerText = "Показ идет! Зритель подключен.";
                });
            } catch (err) {
                alert("Ошибка захвата: " + err.message);
            }
        });
    </script>
</body>
</html>
